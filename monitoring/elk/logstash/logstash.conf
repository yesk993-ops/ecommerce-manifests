input {
  beats {
    port => 5044
    ssl => false
  }

  tcp {
    port => 5000
    codec => json
  }

  syslog {
    port => 514
  }
}

filter {
  if [service] {
    mutate {
      add_tag => ["ecommerce-service"]
    }
  }

  if [kubernetes] {
    mutate {
      add_tag => ["kubernetes"]
    }
  }

  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  if [json] {
    json {
      source => "message"
      target => "parsed"
    }
  }

  mutate {
    remove_field => ["@version", "host"]
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST:-elasticsearch:9200}"]
    index => "ecommerce-logs-%{+YYYY.MM.dd}"
    manage_template => true
    template_overwrite => true
  }

  stdout {
    codec => rubydebug
  }
}
