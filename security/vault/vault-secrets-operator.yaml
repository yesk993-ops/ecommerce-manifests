apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: vault-connection
  namespace: ecommerce
spec:
  address: http://vault:8200
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: static-auth
  namespace: ecommerce
spec:
  vaultConnectionRef: vault-connection
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: ecommerce-app
    serviceAccount: ecommerce-sa
    tokenExpiration: 3600
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: ecommerce-db-creds
  namespace: ecommerce
spec:
  vaultAuthRef: static-auth
  mount: secret
  type: kv-v2
  path: ecommerce/database
  refreshAfter: 1h
  destination:
    name: db-creds
    create: true
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: ecommerce-jwt-secret
  namespace: ecommerce
spec:
  vaultAuthRef: static-auth
  mount: secret
  type: kv-v2
  path: ecommerce/jwt
  refreshAfter: 1h
  destination:
    name: jwt-secret
    create: true
